name: Check Domain

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: domain-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check domain
        run: npm run check
        env:
          DOMAIN: penruddockearms.co.uk
          ALERT_FROM_EMAIL: ${{ vars.ALERT_FROM_EMAIL }}
          ALERT_TO_EMAIL: ${{ vars.ALERT_TO_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
